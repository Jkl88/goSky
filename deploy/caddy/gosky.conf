# goSky — сократитель ссылок SkyKraft
# Docker frontend (nginx): 127.0.0.1:8083 → контейнер :80
# Внутри nginx: /api → backend, /{код} → backend, остальное → SPA
#
# Установка:
#   sudo cp /mnt/home/goSky/deploy/caddy/gosky.conf /etc/caddy/sites/gosky.conf
#   sudo caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy

go.skykraft.su {
    encode gzip

    request_body {
        max_size 4MiB
    }

    reverse_proxy 127.0.0.1:8083 {
        header_up Host {host}
        header_up X-Real-IP {remote}
        header_up X-Forwarded-For {remote}
        header_up X-Forwarded-Proto {scheme}
        header_up X-Forwarded-Host {host}

        transport http {
            dial_timeout 30s
            response_header_timeout 60s
            read_timeout 60s
            write_timeout 60s
            keepalive_interval 30s
            keepalive_idle_conns 50
        }
    }

    header {
        X-Content-Type-Options nosniff
        Referrer-Policy strict-origin-when-cross-origin
    }

    log {
        output stdout
        format console
    }
}
