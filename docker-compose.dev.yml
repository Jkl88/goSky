services:
  postgres:
    image: postgres:16-alpine
    container_name: gosky-postgres-dev
    environment:
      TZ: Europe/Moscow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gosky
    ports:
      - "5433:5432"
    volumes:
      - gosky_postgres_dev_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: gosky-backend-dev
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      TZ: Europe/Moscow
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/gosky
      FRONTEND_ORIGIN: http://localhost:5175
      PUBLIC_BASE_URL: http://localhost:5175
      COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    image: node:22-alpine
    container_name: gosky-frontend-dev
    working_dir: /app
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5175"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5175:5175"
    volumes:
      - ./:/app
    depends_on:
      - backend

volumes:
  gosky_postgres_dev_data:
